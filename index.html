/* ---------------- HELPERS ---------------- */
window.addEventListener("DOMContentLoaded", () => {

if (currentChat) typingRef().set({ typing: false });

serverTime: firebase.firestore.FieldValue.serverTimestamp(),

let uid = "";
let userName = "";
let currentChat = null;
let chatVisible = false;

let typingTimer;
let started = false;

const typingRef = () => db

  if (!currentChat) return;

  db.collection("chats")
    .doc(currentChat)
    .collection("messages")
    .where("senderId", "==", otherUserId)
    .get()
    .then(snapshot => {
      snapshot.forEach(doc => {
        doc.ref.update({

auth.onAuthStateChanged(async (user) => {

console.log("START CALLED");

  try {
    if (!user) {
      show(screens.login);
      return;

    show(screens.loading);

    if (!user.emailVerified) {

/* ---------------- START APP ---------------- */
async function start() {
  try {
    const user = auth.currentUser;
    console.log("START CALLED:", user);

    if (!user) return;

    uid = user.uid;

    const doc = await db.collection("users").doc(user.uid).get();

    if (!doc.exists) {
      show(screens.name);
      return;
    }

    userName = doc.data().name || "User";
    started = true;

    show(screens.app);
    listenChats();
    listenUser();

  } catch (e) {
    console.error("START FAILED:", e);
    show(screens.login);
  }

  try {
    const name = el("nameInput").value.trim();
    if (!name) return;

    if (!auth.currentUser) return;

    el("saveNameBtn").disabled = true;

    const uid = auth.currentUser.uid;

    await db.collection("users").doc(uid).set({
      name,
      email: auth.currentUser.email,
      friends: [],
      requests: []
    });

    await start();

  } catch (e) {
    console.error("SAVE NAME FAILED:", e);
    alert(e.message);
  } finally {
    el("saveNameBtn").disabled = false;
  }
};

/* ---------------- FRIEND REQUEST ---------------- */
el("searchBtn").onclick = async () => {
  const email = el("searchEmail").value.trim();
  if (!email) return;

  try {
    el("searchBtn").disabled = true;

    const snap = await db.collection("users")
      .where("email", "==", email)
      .get();

    if (snap.empty) return alert("User not found");

    const id = snap.docs[0].id;
    if (id === uid) return alert("You cannot add yourself");

    await db.collection("friendRequests").add({
      from: uid,
      to: id,
      status: "pending",
      time: firebase.firestore.FieldValue.serverTimestamp()
    });

    el("searchEmail").value = "";
    alert("Request Sent!");

  } catch (e) {
    alert(e.message);
  } finally {
    el("searchBtn").disabled = false;
  }
};

/* ---------------- USER LISTENER ---------------- */
function listenUser(){
  if (!auth.currentUser) return;
  uid = auth.currentUser.uid;

  if (unsubUser) unsubUser();

  unsubUser = db.collection("users").doc(uid)
    .onSnapshot(doc => {
      const d = doc.data() || {};
      renderFriends(d.friends || []);
    });

  db.collection("friendRequests")
    .where("to", "==", uid)
    .where("status", "==", "pending")
    .onSnapshot(async snap => {

      const container = el("requestsList");
      container.innerHTML = "";

      for (const docSnap of snap.docs) {
        const data = docSnap.data();
        const fromUser = (await db.collection("users").doc(data.from).get()).data();

        const div = document.createElement("div");
        div.className = "request-item";

        const name = document.createElement("span");
        name.textContent = fromUser?.name || "Unknown";

const acceptBtn = document.createElement("button");
acceptBtn.textContent = "✓";

acceptBtn.onclick = async () => {
  await db.collection("friendRequests").doc(docSnap.id).update({
    status: "accepted"
  });

  await db.collection("users").doc(uid).update({
    friends: firebase.firestore.FieldValue.arrayUnion(data.from)
  });

  await db.collection("users").doc(data.from).update({
    friends: firebase.firestore.FieldValue.arrayUnion(uid)
  });
};

const declineBtn = document.createElement("button");
declineBtn.textContent = "✕";

declineBtn.onclick = async () => {
  await db.collection("friendRequests").doc(docSnap.id).update({
    status: "declined"

};

div.appendChild(name);
div.appendChild(acceptBtn);
div.appendChild(declineBtn);

container.appendChild(div);
      }

/* ---------------- FRIENDS ---------------- */
async function renderFriends(list){
  const container = el("friendsList");
  container.innerHTML = "";

  if (!list.length) {
    container.innerHTML = "<div style='padding:20px;color:#888'>No friends yet</div>";
    return;
  }

  const users = await Promise.all(
    list.map(id => db.collection("users").doc(id).get())
  );

  users.forEach(doc => {
    const d = doc.data();
    if (!d) return;

    const div = document.createElement("div");
    div.className = "friendItem";

    div.innerHTML = `
      <div class="friendAvatar">${(d.name || "?")[0]}</div>
      <div class="friendText">
        <div class="friendName">${d.name}</div>
        <div class="friendSub">Tap to chat</div>
      </div>
    `;

    div.onclick = () => {
    console.log("CLICKED FRIEND");
    
      el("chatTitle").textContent = d.name;
      openChat(doc.id);
    };

    container.appendChild(div);
  });
}

/* ---------------- CHAT ---------------- */
function chatId(a,b){
  return [a,b].sort().join("_");
}

function openChat(other){
  otherUserId = other;
  currentChat = chatId(uid, other);
  
  chatVisible = true;

  messageCache = {};
  el("messages").innerHTML = "";

  if (unsubMessages) unsubMessages();
  if (unsubTyping) unsubTyping();

  listenMessages();
  listenTyping();
  
}

let unsubTyping = null;

function listenChats() {
if (!uid) return;
  db.collection("chats")
    .where("users", "array-contains", uid)
    .orderBy("lastTime", "desc")
    .onSnapshot(async snap => {

      const container = el("friendsList");
      container.innerHTML = "";

const chats = snap.docs.map(doc => ({
  id: doc.id,
  data: doc.data()
}));

for (const chat of chats) {
  const data = chat.data;

  const otherId = data.users.find(u => u !== uid);
  const userDoc = await db.collection("users").doc(otherId).get();
  const d = userDoc.data();

  const div = document.createElement("div");
  div.className = "friendItem";

  div.innerHTML = `
    <div class="friendAvatar">${(d.name || "?")[0]}</div>
    <div class="friendText">
      <div class="friendName">${d.name}</div>
      <div class="friendSub">${data.lastMessage || ""}</div>
    </div>
  `;

  div.onclick = () => {
    el("chatTitle").textContent = d.name;
    openChat(otherId);
  };

  container.appendChild(div);
}
    });
}

function listenTyping() {
  if (unsubTyping) unsubTyping();

  unsubTyping = db.collection("chats")
    .doc(currentChat)
    .collection("typing")
    .onSnapshot(snapshot => {

      let someoneTyping = false;

      snapshot.forEach(doc => {
        if (doc.id !== uid && doc.data().typing) {
          someoneTyping = true;
        }
      });

      el("typingIndicator").style.display =
        someoneTyping ? "inline-flex" : "none";
    });
}

function listenMessages(){
  if (unsubMessages) unsubMessages();

  el("messages").innerHTML = "";

  unsubMessages = db.collection("chats")
    .doc(currentChat)
    .collection("messages")
    .orderBy("serverTime", "asc")
    .onSnapshot(snap => {

      const container = el("messages");

      snap.docChanges().forEach(change => {
  if (change.type !== "added" && change.type !== "modified") return;

  const doc = change.doc;
  const m = doc.data();
  const isMe = m.senderId === uid;
  
  if (!isMe && !m.readBy?.includes(uid)) {
  doc.ref.update({
    readBy: firebase.firestore.FieldValue.arrayUnion(uid),
    deliveredTo: firebase.firestore.FieldValue.arrayUnion(uid)
  });
}

        const timeObj = m.serverTime?.toDate?.();
        const timeStr = timeObj
          ? timeObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          : "";

        const read = m.readBy?.includes(uid);

        let ticks = "";
        let tickColor = "inherit";

        if (isMe) {
          const delivered = m.deliveredTo?.length > 0;

          if (!delivered) {
            ticks = "✓";
          } else if (!read) {
            ticks = "✓✓";
          } else {
            ticks = "✓✓";
            tickColor = "#4da3ff";
          }
        }

        const div = document.createElement("div");
        div.id = doc.id;
        div.className = "bubble " + (isMe ? "me" : "them");

        div.innerHTML = `
          <div class="bubble-user">${m.user}</div>
          ${m.text}
          <div style="font-size:10px;opacity:0.6;margin-top:4px;display:flex;gap:6px;">
            <span>${timeStr}</span>
            ${isMe ? `<span style="color:${tickColor}">${ticks}</span>` : ""}
          </div>
        `;

        const existing = document.getElementById(doc.id);

if (existing) {
  existing.replaceWith(div);
} else {
  container.appendChild(div);
}
      });

      container.scrollTop = container.scrollHeight;
    });
}

</script>
